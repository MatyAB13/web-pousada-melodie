<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas - Melodie Pousada</title>
  <meta name="description" content="Faça sua reserva na Melodie Pousada">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0D4F4F',
            'primary-light': '#1A7A7A',
            accent: '#FF8C42',
            'ocean-100': '#B3E8E8',
            'ocean-200': '#80D9D9',
            // etc.
          },
          fontFamily: {
            heading: ['Cormorant Garamond', 'serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
  <!-- Header same as index -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-white shadow-md py-4">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2">
        <div class="w-10 h-10 rounded-full bg-[#0D4F4F] flex items-center justify-center">
          <span class="text-white font-bold">M</span>
        </div>
        <span class="font-bold text-lg text-[#0D4F4F]">Melodie Pousada</span>
      </a>
      <div class="flex gap-4">
        <a href="/" class="text-gray-700 hover:text-[#0D4F4F]">Início</a>
        <a href="/quartos.html" class="text-gray-700 hover:text-[#0D4F4F]">Quartos</a>
        <a href="index.html#contact" class="bg-[#0D4F4F] text-white px-6 py-2 rounded-full hover:bg-[#1A7A7A]">Reservar</a>
      </div>
    </div>
  </header>

  <!-- Booking Form -->
  <section class="min-h-screen pt-24 pb-20 flex items-center">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-8">
        <h1 class="font-bold text-3xl text-[#0D4F4F] mb-2">Fazer Reserva</h1>
        <p class="text-gray-600">Complete os dados para sua estadia</p>
      </div>
      <form id="booking-form" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Nome Completo</label>
          <input type="text" name="guestName" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#0D4F4F]/20 focus:border-[#0D4F4F]">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#0D4F4F]/20 focus:border-[#0D4F4F]">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Telefone</label>
          <input type="tel" name="phone" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#0D4F4F]/20 focus:border-[#0D4F4F]">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Check-in</label>
            <input type="date" name="checkIn" required class="w-full px-4 py-3 rounded-xl border border-gray-200">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Check-out</label>
            <input type="date" name="checkOut" required class="w-full px-4 py-3 rounded-xl border border-gray-200">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Quartos</label>
          <select name="rooms" class="w-full px-4 py-3 rounded-xl border border-gray-200">
            <option>1 Quarto</option>
            <option>2 Quartos</option>
            <option>Cobertura (até 10p)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Hóspedes</label>
          <input type="number" name="guests" min="1" max="10" class="w-full px-4 py-3 rounded-xl border border-gray-200">
        </div>
        <button type="submit" class="w-full bg-[#0D4F4F] hover:bg-[#1A7A7A] text-white font-medium py-4 rounded-xl text-lg transition-all">
          Confirmar Reserva
        </button>
      </form>
      <div id="booking-success" class="mt-6 p-4 bg-green-50 border border-green-200 rounded-xl hidden">
        <p class="text-green-800 font-medium mb-2">✅ Reserva confirmada!</p>
        <p id="booking-code" class="text-sm text-green-700"></p>
        <p class="text-sm text-green-700">Entraremos em contato em breve.</p>
      </div>
    </div>
  </section>

  <script>
    document.getElementById('booking-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const booking = Object.fromEntries(formData);
      const code = 'MEL' + Date.now().toString(36).toUpperCase();
      const fullBooking = {...booking, code, status: 'confirmed'};
      localStorage.setItem('bookings', JSON.stringify([...JSON.parse(localStorage.getItem('bookings') || '[]'), fullBooking]));
      
      document.getElementById('booking-success').classList.remove('hidden');
      document.getElementById('booking-code').textContent = `Código: ${code}`;
      this.reset();
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
