<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria - Melodie Pousada</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <header class="fixed top-0 bg-white shadow p-4 z-50 w-full">
    <nav class="max-w-4xl mx-auto flex justify-between">
      <a href="/" class="font-bold text-[#0D4F4F]">Melodie</a>
      <a href="/reservas.html" class="bg-[#0D4F4F] text-white px-6 py-2 rounded-full">Reservar</a>
    </nav>
  </header>
  <section class="pt-20 py-20">
    <div class="max-w-4xl mx-auto px-4 text-center">
      <h1 class="text-4xl font-bold text-[#0D4F4F] mb-8">Galeria</h1>
      <p class="text-gray-600 mb-16">Conheça mais da nossa pousada em fotos</p>
      <!-- Image grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&q=80" alt="Pousada exterior" class="rounded-xl hover:scale-105 transition-transform">
        <!-- more images -->
        <div class="h-64 bg-gradient-to-r from-blue-400 to-teal-500 rounded-xl"></div>
        <div class="h-64 bg-gradient-to-r from-orange-400 to-red-500 rounded-xl"></div>
        <div class="h-64 bg-gradient-to-r from-purple-400 to-pink-500 rounded-xl"></div>
        <div class="h-64 bg-gradient-to-r from-green-400 to-blue-500 rounded-xl col-span-2 md:col-span-2 lg:col-span-1"></div>
      </div>
    </div>
  </section>
  <script src="script.js"></script>
</body>
</html>
